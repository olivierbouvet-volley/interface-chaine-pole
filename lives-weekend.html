<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lives du Week-end - Pôle Espoir Volleyball</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --success: #10B981;
            --danger: #EF4444;
            --dark: #1F2937;
            --gray: #6B7280;
            --light-gray: #F3F4F6;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            min-height: 100vh;
            color: var(--white);
        }

        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 20px;
        }

        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }

        .match-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .match-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-color: var(--primary);
        }

        .match-status {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            z-index: 10;
        }

        .status-live {
            background: var(--danger);
            animation: pulse 2s ease-in-out infinite;
        }

        .status-upcoming {
            background: rgba(245, 158, 11, 0.9);
        }

        .status-finished {
            background: rgba(107, 114, 128, 0.9);
        }

        .match-video {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            overflow: hidden;
        }

        .match-video iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
            /* Désactive les clics sur l'iframe pour éviter d'ouvrir YT */
        }

        /* Masquage YouTube style multiplex */
        .yt-mask-multiplex {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 35px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            z-index: 2;
            pointer-events: none;
        }

        .mini-pole-logo {
            height: 15px;
            opacity: 1;
        }

        .match-info {
            padding: 20px;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .player-photo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
        }

        .player-name {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .vs-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .vs-separator {
            opacity: 0.5;
        }

        .score-line {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .team-score {
            text-align: center;
        }

        .score-points {
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary);
            line-height: 1;
        }

        .score-sets {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 4px;
        }

        .final-score {
            width: 100%;
            text-align: center;
            padding: 10px;
        }

        .final-score-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #22c55e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .final-score-value {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .sets-history {
            margin-top: 8px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            text-align: center;
        }

        .match-date {
            text-align: center;
            font-size: 0.85rem;
            opacity: 0.7;
        }

        .no-youtube {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            gap: 12px;
        }

        .countdown-timer {
            text-align: center;
        }

        .countdown-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: var(--primary-light);
            font-weight: 700;
        }

        .countdown-units {
            display: flex;
            gap: 15px;
        }

        .unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 35px;
        }

        .unit-val {
            font-size: 1.6rem;
            font-weight: 800;
            color: white;
            line-height: 1;
        }

        .unit-label {
            font-size: 0.55rem;
            text-transform: uppercase;
            opacity: 0.5;
            margin-top: 4px;
        }

        /* Sponsor Overlay */
        .sponsor-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 40px;
            animation: fadeIn 0.5s ease;
        }

        .sponsor-overlay.show {
            display: flex;
        }

        .sponsor-content {
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        .countdown {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            backdrop-filter: blur(10px);
        }

        .close-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .principal-sponsor {
            background: white;
            border-radius: 24px;
            padding: 60px;
            margin-bottom: 32px;
            box-shadow: 0 0 80px rgba(99, 102, 241, 0.5);
        }

        .principal-sponsor img,
        .principal-sponsor video {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }

        .secondary-sponsors {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .secondary-sponsor {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .secondary-sponsor img,
        .secondary-sponsor video {
            max-width: 100%;
            max-height: 100px;
            object-fit: contain;
        }

        /* Bandeau sponsors fixe */
        .sponsor-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            padding: 16px;
            border-top: 2px solid rgba(99, 102, 241, 0.5);
            z-index: 50;
        }

        .sponsor-banner-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            overflow-x: auto;
        }

        .banner-sponsor {
            flex-shrink: 0;
        }

        .banner-sponsor img {
            height: 50px;
            max-width: 150px;
            object-fit: contain;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .banner-sponsor img:hover {
            opacity: 1;
        }

        .empty-state {
            text-align: center;
            padding: 100px 20px;
        }

        .empty-state h2 {
            font-size: 2rem;
            margin-bottom: 16px;
            opacity: 0.7;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        @media (max-width: 768px) {
            .matches-grid {
                grid-template-columns: 1fr;
            }

            .sponsor-overlay {
                padding: 20px;
            }

            .principal-sponsor {
                padding: 30px;
            }

            .countdown {
                top: 10px;
                right: 10px;
                font-size: 1.2rem;
                padding: 8px 16px;
            }

            .close-btn {
                top: 10px;
                left: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="header-content">
            <h1>🏐 Lives du Week-end</h1>
            <div class="filters">
                <button class="filter-btn active" onclick="filterMatches('all')">
                    Tous les matchs
                </button>
                <button class="filter-btn" onclick="filterMatches('live')">
                    🔴 En direct
                </button>
                <button class="filter-btn" onclick="filterMatches('replay')">
                    📹 Replay
                </button>
                <button class="filter-btn" onclick="filterMatches('upcoming')">
                    ⏳ À venir
                </button>
                <a href="interviews.html" class="filter-btn" style="text-decoration: none; align-items: center; display: flex;">
                    🎙️ Interviews Interpole
                </a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="matches-grid" id="matchesGrid">
            <div class="empty-state">
                <h2>🔄 Chargement des matchs...</h2>
            </div>
        </div>
    </div>

    <!-- Bandeau sponsors fixe -->
    <div class="sponsor-banner">
        <div class="sponsor-banner-content" id="sponsorBanner">
            <!-- Sponsors chargés dynamiquement -->
        </div>
    </div>

    <!-- Overlay sponsors (pause entre sets) -->
    <div class="sponsor-overlay" id="sponsorOverlay">
        <button class="close-btn" onclick="closeSponsorOverlay()">✕</button>
        <div class="countdown" id="countdown">2:00</div>
        <div class="sponsor-content" id="sponsorContent">
            <!-- Contenu chargé dynamiquement -->
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <!-- Services Firebase -->
    <script src="firebase-config.js"></script>
    <script src="db-service.js"></script>
    <script src="storage-service.js"></script>

    <script>
        let allMatches = {};
        let currentFilter = 'all';
        let sponsorOverlayTimer = null;
        let countdownInterval = null;

        // Initialisation
        window.addEventListener('DOMContentLoaded', () => {
            loadMatches();
            loadSponsorsForBanner();
        });

        // Charger tous les matchs en temps réel
        function loadMatches() {
            dbService.listenToAllMatches((matches) => {
                allMatches = matches;
                console.log('✅ Matchs chargés:', matches);
                
                // Debug: afficher la structure de chaque match
                Object.entries(matches).forEach(([id, match]) => {
                    console.log(`Match ${id}:`, {
                        team1: match.team1,
                        team2: match.team2,
                        score: match.score,
                        status: match.status
                    });
                });
                
                renderMatches();

                // Surveiller les overlays sponsors
                checkForSponsorOverlays();
            });
        }

        // Afficher les matchs
        function renderMatches() {
            const grid = document.getElementById('matchesGrid');
            const matchesArray = Object.values(allMatches);

            // Filtrer selon le filtre actif
            const filteredMatches = matchesArray.filter(match => {
                if (currentFilter === 'all') return true;
                if (currentFilter === 'replay') {
                    // Un match est en replay s'il est terminé ET qu'il a des segments vidéo
                    return match.status === 'finished' && match.videoSegments && Object.keys(match.videoSegments).length > 0;
                }
                return match.status === currentFilter;
            });

            // Trier par date/heure
            filteredMatches.sort((a, b) => {
                const dateA = new Date(a.date + ' ' + a.time);
                const dateB = new Date(b.date + ' ' + b.time);
                return dateB - dateA; // Plus récent en premier
            });

            if (filteredMatches.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <h2>😔 Aucun match trouvé</h2>
                        <p style="opacity: 0.7;">Revenez plus tard ou changez de filtre</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredMatches.map(match => renderMatchCard(match)).join('');
        }

        // Afficher une carte de match
        function renderMatchCard(match) {
            const statusClass = `status-${match.status}`;
            const statusText = {
                live: '🔴 En direct',
                upcoming: '⏳ À venir',
                finished: '✓ Terminé'
            }[match.status] || 'À venir';

            const videoEmbed = match.youtubeUrl
                ? getVideoEmbed(match.youtubeUrl)
                : null;

            // Compatibilité rétroactive: supporter ancienne et nouvelle structure
            const playerPhoto = match.team1?.playerPhoto || match.playerPhoto || '';
            const playerName = match.team1?.declaringPlayer || match.playerName || 'Non renseigné';
            const team1Name = match.team1?.name || match.clubName || 'Équipe 1';
            const team2Name = match.team2?.name || match.opponent || 'Équipe 2';
            
            // Score avec compatibilité rétroactive
            const score = match.score || {};
            const pointsTeam1 = score.pointsTeam1 ?? score.pointsHome ?? 0;
            const pointsTeam2 = score.pointsTeam2 ?? score.pointsAway ?? 0;
            const setsTeam1 = score.setsTeam1 ?? score.setsHome ?? 0;
            const setsTeam2 = score.setsTeam2 ?? score.setsAway ?? 0;

            // Calcul l'historique des sets
            let setsHistoryHtml = '';
            // On affiche l'historique si on a des sets terminés (match fini ou en direct avec sets > 0)
            if (match.setHistory && match.setHistory.length > 0) {
                 const setsStr = match.setHistory.map(s => {
                     const p1 = s.team1Points !== undefined ? s.team1Points : (s.team1points || 0);
                     const p2 = s.team2Points !== undefined ? s.team2Points : (s.team2points || 0);
                     return `${p1}-${p2}`;
                 }).join(', ');
                 setsHistoryHtml = `<div class="sets-history">(${setsStr})</div>`;
            }

            return `
                <div class="match-card" onclick="openMatch('${match.id}')">
                    <span class="match-status ${statusClass}">${statusText}</span>
                    
                    <div class="match-video">
                        ${videoEmbed
                    ? videoEmbed.html
                    : `
                        <div class="no-youtube" style="${match.matchPoster ? `background-image: url('${match.matchPoster}'); background-size: contain; background-repeat: no-repeat; background-position: center; background-color: #000;` : ''}">
                            <div class="countdown-timer" data-date="${match.date}" data-time="${match.time}" style="position: relative; z-index: 2; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 12px;">
                                <div class="countdown-label">Début dans</div>
                                <div class="countdown-units">
                                    <div class="unit"><span class="unit-val">--</span><span class="unit-label">j</span></div>
                                    <div class="unit"><span class="unit-val">--</span><span class="unit-label">h</span></div>
                                    <div class="unit"><span class="unit-val">--</span><span class="unit-label">m</span></div>
                                    <div class="unit"><span class="unit-val">--</span><span class="unit-label">s</span></div>
                                </div>
                            </div>
                        </div>`
                }
                    </div>

                    <div class="match-info">
                        <div class="player-info">
                            ${playerPhoto
                    ? `<img src="${playerPhoto}" alt="${playerName}" class="player-photo">`
                    : `<div class="player-photo" style="background: linear-gradient(135deg, #6366F1, #EC4899);"></div>`
                }
                            <div class="player-name">${playerName}</div>
                        </div>

                        <div class="vs-line">
                            <span>${team1Name}</span>
                            <span class="vs-separator">vs</span>
                            <span>${team2Name}</span>
                        </div>

                        <div class="score-line">
                            ${match.status === 'finished' 
                                ? `
                                    <div class="final-score">
                                        <div class="final-score-label">🏆 Score Final</div>
                                        <div class="final-score-value">${setsTeam1} - ${setsTeam2}</div>
                                    </div>
                                `
                                : `
                                    <div class="team-score">
                                        <div class="score-points">${pointsTeam1}</div>
                                        <div class="score-sets">Sets: ${setsTeam1}</div>
                                    </div>
                                    <div class="team-score">
                                        <div class="score-points">${pointsTeam2}</div>
                                        <div class="score-sets">Sets: ${setsTeam2}</div>
                                    </div>
                                `
                            }
                        </div>
                        
                        ${setsHistoryHtml}

                        <div class="match-date">
                            ${formatMatchDate(match.date, match.time)}
                        </div>
                    </div>
                </div>
            `;
        }

        // Convertir URL Vidéo (YouTube ou Facebook) en embed
        function getVideoEmbed(url) {
            if (!url) return null;

            // YouTube
            if (url.includes('youtube') || url.includes('youtu.be')) {
                const videoIdMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|live\/|shorts\/))([^?&/]+)/);
                if (videoIdMatch && videoIdMatch[1]) {
                    return {
                        type: 'youtube',
                        html: `<iframe src="https://www.youtube.com/embed/${videoIdMatch[1]}?autoplay=1&mute=0" allowfullscreen></iframe>
                               <div class="yt-mask-multiplex">
                                   <img src="logo-pole-official.png?v=1" class="mini-pole-logo">
                               </div>`
                    };
                }
            }

            // Facebook
            if (url.includes('facebook') || url.includes('fb.watch')) {
                const embedUrl = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}&show_text=false&t=0`;
                return {
                    type: 'facebook',
                    html: `<iframe src="${embedUrl}" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>`
                };
            }

            return null;
        }

        // Filtrer les matchs
        function filterMatches(filter) {
            currentFilter = filter;

            // Mettre à jour les boutons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            renderMatches();
        }

        // Ouvrir un match en plein écran
        function openMatch(matchId) {
            window.location.href = `match-viewer.html?id=${matchId}`;
        }

        // Charger les sponsors pour le bandeau
        async function loadSponsorsForBanner() {
            const sponsors = await dbService.getActiveSponsors();
            const banner = document.getElementById('sponsorBanner');

            if (sponsors.length === 0) {
                banner.innerHTML = '<p style="opacity: 0.5;">Aucun sponsor pour le moment</p>';
                return;
            }

            banner.innerHTML = sponsors.map(sponsor => `
                <div class="banner-sponsor">
                    ${sponsor.type === 'video'
                    ? `<video src="${sponsor.mediaUrl}" autoplay muted loop></video>`
                    : `<img src="${sponsor.mediaUrl}" alt="${sponsor.name}">`
                }
                </div>
            `).join('');
        }

        // Vérifier les overlays sponsors
        function checkForSponsorOverlays() {
            Object.values(allMatches).forEach(match => {
                if (match.showSponsor && !document.getElementById('sponsorOverlay').classList.contains('show')) {
                    showSponsorOverlay(match);
                }
            });
        }

        // Afficher l'overlay sponsors
        async function showSponsorOverlay(match) {
            const overlay = document.getElementById('sponsorOverlay');
            const content = document.getElementById('sponsorContent');

            // Charger les sponsors
            const sponsors = await dbService.getActiveSponsors(match.playerName);

            if (sponsors.length === 0) return;

            // Séparer principal et secondaires
            const principal = sponsors.find(s => s.isPrincipal);
            const secondaries = sponsors.filter(s => !s.isPrincipal);

            let html = '';

            if (principal) {
                html += `
                    <div class="principal-sponsor">
                        ${principal.type === 'video'
                        ? `<video src="${principal.mediaUrl}" autoplay loop></video>`
                        : `<img src="${principal.mediaUrl}" alt="${principal.name}">`
                    }
                    </div>
                `;
            }

            if (secondaries.length > 0) {
                html += '<div class="secondary-sponsors">';
                secondaries.forEach(sponsor => {
                    html += `
                        <div class="secondary-sponsor">
                            ${sponsor.type === 'video'
                            ? `<video src="${sponsor.mediaUrl}" autoplay muted loop></video>`
                            : `<img src="${sponsor.mediaUrl}" alt="${sponsor.name}">`
                        }
                        </div>
                    `;
                });
                html += '</div>';
            }

            content.innerHTML = html;
            overlay.classList.add('show');

            // Démarrer le countdown
            startCountdown(120);
        }

        // Countdown
        function startCountdown(seconds) {
            let remaining = seconds;
            const countdownEl = document.getElementById('countdown');

            countdownInterval = setInterval(() => {
                remaining--;
                const minutes = Math.floor(remaining / 60);
                const secs = remaining % 60;
                countdownEl.textContent = `${minutes}:${secs.toString().padStart(2, '0')}`;

                if (remaining <= 0) {
                    closeSponsorOverlay();
                }
            }, 1000);
        }

        // Fermer l'overlay
        function closeSponsorOverlay() {
            document.getElementById('sponsorOverlay').classList.remove('show');
            if (countdownInterval) {
                clearInterval(countdownInterval);
            }
        }

        // Formater la date du match
        function formatMatchDate(dateStr, timeStr) {
            const date = new Date(dateStr);
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            return date.toLocaleDateString('fr-FR', options) + ' à ' + timeStr;
        }

        // Système de décompte dynamique
        function updateCountdowns() {
            const now = new Date();
            document.querySelectorAll('.countdown-timer').forEach(el => {
                const dateStr = el.dataset.date;
                const timeStr = el.dataset.time || "00:00";

                // Parser la date (Format YYYY-MM-DD) et l'heure (Format HH:mm)
                const target = new Date(`${dateStr}T${timeStr}:00`);
                const diff = target - now;

                if (diff <= 0) {
                    // Le match aurait dû commencer - afficher le temps écoulé depuis l'heure prévue
                    const elapsed = Math.abs(diff);
                    const h = Math.floor(elapsed / (1000 * 60 * 60));
                    const m = Math.floor((elapsed % (1000 * 60 * 60)) / (1000 * 60));
                    const s = Math.floor((elapsed % (1000 * 60)) / 1000);
                    
                    el.innerHTML = `
                        <div class="countdown-label" style="color:#ef4444">LE MATCH VA COMMENCER</div>
                        <div style="font-size:1.2rem; margin-top:8px; opacity:0.8;">
                            Heure prévue dépassée de: ${h > 0 ? h + 'h ' : ''}${m}min ${s}s
                        </div>
                        <p style="font-size:0.8rem; margin-top:8px; opacity:0.6;">En attente du flux vidéo...</p>
                    `;
                    return;
                }

                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);

                const units = el.querySelectorAll('.unit-val');
                if (units.length === 4) {
                    units[0].textContent = d;
                    units[1].textContent = h;
                    units[2].textContent = m;
                    units[3].textContent = s;
                }
            });
        }

        // Lancer la boucle de décompte
        setInterval(updateCountdowns, 1000);
    </script>
</body>

</html>
