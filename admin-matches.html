<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration des Matchs - Pôle Espoir</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366F1;
            --bg-dark: #0f172a;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .match-grid {
            display: grid;
            gap: 20px;
        }

        .match-row {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .match-info h3 {
            margin: 0 0 5px 0;
        }

        .match-info p {
            margin: 0;
            opacity: 0.6;
            font-size: 0.9rem;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .status-live {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .status-finished {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .status-upcoming {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .actions button {
            margin-left: 10px;
        }

        .loading {
            text-align: center;
            padding: 100px;
            font-size: 1.5rem;
            opacity: 0.5;
        }

        /* Fonctions Avancées */
        .advanced-panel {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid var(--danger);
            border-radius: 12px;
            padding: 20px;
            margin-top: 12px;
            display: none;
        }

        .advanced-panel.show {
            display: block;
        }

        .advanced-panel h4 {
            color: var(--danger);
            margin: 0 0 16px 0;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 0.95rem;
        }

        .form-group small {
            display: block;
            margin-top: 4px;
            opacity: 0.6;
            font-size: 0.85rem;
        }

        .btn-warning {
            background: var(--warning);
            color: white;
        }

        .btn-info {
            background: var(--primary);
            color: white;
        }

        .btn-block {
            width: 100%;
            margin-top: 8px;
        }

        .btn-toggle {
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        /* Panneau FDME */
        .fdme-panel {
            background: rgba(245, 158, 11, 0.08);
            border: 2px solid rgba(245, 158, 11, 0.5);
            border-radius: 12px;
            padding: 20px;
            margin-top: 12px;
            display: none;
        }
        .fdme-panel.show { display: block; }
        .fdme-panel h4 { color: #f59e0b; margin: 0 0 14px 0; font-size: 1rem; }
        .fdme-drop-zone {
            border: 2px dashed rgba(245,158,11,0.4);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            background: rgba(245,158,11,0.04);
        }
        .fdme-drop-zone:hover, .fdme-drop-zone.has-file {
            border-color: #f59e0b;
            background: rgba(245,158,11,0.1);
        }
        .fdme-file-status { font-size: 0.85rem; color: #10b981; font-weight: 600; margin-top: 6px; }
        .fdme-preview-img { max-width: 100%; max-height: 180px; border-radius: 8px; margin-top: 10px; border: 1px solid rgba(245,158,11,0.3); }

        /* === MODE SÉLECTION MULTIPLE === */
        .match-row.selectable { cursor: pointer; transition: background 0.15s, border-color 0.15s; }
        .match-row.selectable:hover { background: rgba(255,255,255,0.08); }
        .match-row.selected {
            background: rgba(239,68,68,0.12);
            border-color: rgba(239,68,68,0.5);
        }

        .match-checkbox {
            display: none;
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            accent-color: var(--danger);
            cursor: pointer;
            margin-right: 4px;
        }

        body.select-mode .match-checkbox { display: block; }
        body.select-mode .match-row { cursor: pointer; }

        /* === MODAL VALIDATION FDME === */
        .fdme-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 10000;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            overflow-y: auto;
        }
        .fdme-modal-overlay.show { display: flex; }
        .fdme-modal {
            background: #1e293b;
            border: 2px solid rgba(245,158,11,0.5);
            border-radius: 16px;
            max-width: 900px;
            width: 100%;
            padding: 28px;
            box-shadow: 0 12px 48px rgba(0,0,0,0.5);
        }
        .fdme-modal h2 { color: #f59e0b; margin: 0 0 8px 0; font-size: 1.3rem; }
        .fdme-modal .fdme-confidence {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .fdme-modal .fdme-confidence.high { background: rgba(16,185,129,0.2); color: #10b981; }
        .fdme-modal .fdme-confidence.medium { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .fdme-modal .fdme-confidence.low { background: rgba(239,68,68,0.2); color: #ef4444; }

        .fdme-section { margin-bottom: 18px; }
        .fdme-section h3 {
            font-size: 0.95rem;
            margin: 0 0 8px 0;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .fdme-roster-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .fdme-team-col h4 { font-size: 0.85rem; margin: 0 0 6px 0; opacity: 0.9; }
        .fdme-player-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.82rem;
            background: rgba(255,255,255,0.03);
            margin-bottom: 3px;
        }
        .fdme-player-row .num {
            background: rgba(99,102,241,0.25);
            color: #a5b4fc;
            padding: 2px 7px;
            border-radius: 4px;
            font-weight: 700;
            min-width: 28px;
            text-align: center;
        }
        .fdme-player-row.libero .num {
            background: rgba(245,158,11,0.25);
            color: #fbbf24;
        }
        .fdme-player-row .lic { opacity: 0.5; font-size: 0.75rem; margin-left: auto; }

        .fdme-rotation-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
            margin-top: 6px;
        }
        .fdme-rotation-table th, .fdme-rotation-table td {
            padding: 5px 8px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .fdme-rotation-table th {
            background: rgba(255,255,255,0.05);
            font-weight: 600;
            font-size: 0.75rem;
            opacity: 0.7;
        }
        .fdme-rotation-table .serve-indicator {
            color: #f59e0b;
            font-weight: 700;
        }

        .fdme-results-row {
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 0.9rem;
        }
        .fdme-set-score {
            background: rgba(255,255,255,0.06);
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: 600;
        }

        .fdme-issues {
            background: rgba(245,158,11,0.08);
            border: 1px solid rgba(245,158,11,0.3);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.8rem;
            max-height: 120px;
            overflow-y: auto;
        }
        .fdme-issues div { margin-bottom: 3px; }

        .fdme-modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }

        /* Barre flottante de suppression */
        #bulkBar {
            display: none;
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            border: 1px solid rgba(239,68,68,0.5);
            border-radius: 14px;
            padding: 14px 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            gap: 16px;
            z-index: 999;
            min-width: 320px;
        }

        body.select-mode #bulkBar { display: flex; }

        #bulkBar .bulk-count {
            font-weight: 700;
            font-size: 0.95rem;
            color: #f87171;
            flex: 1;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Gestion des Matchs</h1>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <a href="index.html" class="btn btn-outline">🏠 Accueil</a>
            <a href="formulaire-match.html" class="btn btn-outline">➕ Nouveau Match Live</a>
            <a href="formulaire-match.html?mode=replay" class="btn btn-primary" style="background:#10b981;">🎬 Nouveau Match Replay</a>
            <button class="btn btn-outline" onclick="location.reload()">🔄 Actualiser</button>
            <button class="btn btn-outline" id="btnSelectMode" onclick="toggleSelectMode()" style="border-color:var(--danger);color:var(--danger);">
                ☑️ Sélectionner
            </button>
        </div>
    </div>

    <!-- Barre flottante suppression en masse -->
    <div id="bulkBar">
        <span class="bulk-count" id="bulkCount">0 match sélectionné</span>
        <button class="btn btn-outline" style="font-size:0.85rem;padding:7px 14px;" onclick="selectAllMatches()">✔ Tout sélectionner</button>
        <button class="btn btn-danger" style="font-size:0.85rem;padding:7px 16px;" onclick="supprimerSelection()">🗑️ Supprimer la sélection</button>
        <button class="btn btn-outline" style="font-size:0.85rem;padding:7px 14px;" onclick="toggleSelectMode()">✕ Annuler</button>
    </div>

    <!-- Modal Validation FDME -->
    <div class="fdme-modal-overlay" id="fdmeModalOverlay" onclick="if(event.target===this)closeFdmeModal()">
        <div class="fdme-modal" id="fdmeModalContent">
            <!-- Rempli dynamiquement par showFdmeValidationModal() -->
        </div>
    </div>

    <div id="matchList" class="match-grid">
        <div class="loading">Chargement des matchs...</div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <!-- Services -->
    <script src="firebase-config.js"></script>
    <script src="db-service.js"></script>
    <script src="storage-service.js"></script>
    <script src="export-dvw.js"></script>
    <script src="dvw-parser-lite.js"></script>
    <script src="rapport-match.js"></script>
    <script src="fdme-service.js"></script>
    <script src="rotation-engine.js"></script>
    <!-- Clé API Gemini — fichier local uniquement, gitignored, non déployé -->
    <script src="gemini-config.js" onerror="console.log('gemini-config.js absent — clé à configurer via le bouton')"></script>

    <script>
        async function loadMatches() {
            dbService.listenToAllMatches((matches) => {
                const container = document.getElementById('matchList');

                // Mémoriser les panneaux actuellement ouverts
                const openPanels = new Set();
                container.querySelectorAll('.advanced-panel.open').forEach(el => {
                    const id = el.id.replace('advanced-', '');
                    openPanels.add(id);
                });

                container.innerHTML = '';

                // Trier par date décroissante
                const sortedIds = Object.keys(matches).sort((a, b) => {
                    return new Date(matches[b].date) - new Date(matches[a].date);
                });

                if (sortedIds.length === 0) {
                    container.innerHTML = '<div class="loading">Aucun match trouvé.</div>';
                    return;
                }

                sortedIds.forEach(id => {
                    const match = matches[id];
                    if (!match || typeof match !== 'object') return; // sécurité : ignorer les entrées nulles
                    const row = document.createElement('div');
                    row.className = 'match-row';
                    row.setAttribute('data-id', id);

                    const statusClass = `status-${match.status || 'upcoming'}`;
                    const statusLabel = {
                        'live': '🔴 En Direct',
                        'finished': '✓ Terminé',
                        'upcoming': '⏳ À venir'
                    }[match.status] || 'Inconnu';

                    const team1Name = match.team1?.name || match.clubName || 'Équipe 1';
                    const team2Name = match.team2?.name || match.opponent || 'Équipe 2';
                    const currentSets1 = match.score?.setsTeam1 || 0;
                    const currentSets2 = match.score?.setsTeam2 || 0;
                    const currentOffset = match.videoSync?.offsetSeconds || 0;

                    row.innerHTML = `
                        <input type="checkbox" class="match-checkbox" id="chk-${id}" onclick="event.stopPropagation(); toggleSelection('${id}')">
                        <div class="match-info">
                            <h3>${team1Name} vs ${team2Name}</h3>
                            <p>${match.playerName || match.team1?.declaringPlayer || 'N/A'} - ${match.date} ${match.time || ''}</p>
                            <span class="status-badge ${statusClass}">${statusLabel}</span>
                        </div>
                        <div class="actions">
                            <button class="btn btn-outline" onclick="setStatus('${id}', 'upcoming')">⏳ Report</button>
                            <a class="btn btn-outline" href="match-viewer.html?id=${id}" target="_blank" style="text-decoration:none;">🎬 Replay</a>
                            <button class="btn btn-outline" onclick="setStatus('${id}', 'live')">🔴 Direct</button>
                            <button class="btn btn-outline" onclick="setStatus('${id}', 'finished')">✓ Finir</button>
                            <button class="btn btn-toggle" onclick="toggleAdvanced('${id}')">⚙️ Avancé</button>
                            ${match.fdmeUrl
                                ? `<button class="btn btn-toggle" id="fdme-btn-${id}" style="border-color:#10b981; color:#10b981; background:rgba(16,185,129,0.15);" onclick="toggleFdme('${id}')"><span style="color:#10b981;">✓</span> FDME</button>`
                                : `<button class="btn" id="fdme-btn-${id}" style="background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.5);color:#f59e0b;" onclick="toggleFdme('${id}')">📤 FDME</button>`
                            }
                            <button class="btn btn-danger" onclick="deleteMatch('${id}')">🗑️ Supprimer</button>
                        </div>

                        <!-- Panneau Fonctions Avancées -->
                        <div class="advanced-panel" id="advanced-${id}">
                            <h4>⚠️ Fonctions Avancées - ${team1Name} vs ${team2Name}</h4>
                            
                            <!-- Diagnostics Flux Vidéo & Édition -->
                            <div style="border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 12px; margin-bottom: 12px; background: rgba(0, 0, 0, 0.2); padding: 10px; border-radius: 6px;">
                                <strong>📹 Gestion du Flux Vidéo</strong>
                                <p style="font-size: 0.85rem; margin: 5px 0; opacity: 0.8;">Ajoutez ou modifiez le lien du live (YouTube/Facebook) ici.</p>
                                <div class="form-group" style="margin-bottom: 8px;">
                                    <label style="font-size: 0.8rem; display: block; margin-bottom: 4px;">Lien Direct:</label>
                                    <div style="display: flex; gap: 8px;">
                                        <input type="text" id="videoUrl-${id}" value="${match.youtubeUrl || ''}" placeholder="https://..." style="flex:1; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 4px;">
                                        <button class="btn btn-primary" onclick="updateMatchVideoUrl('${id}')" style="padding: 0 15px;">💾</button>
                                    </div>
                                </div>
                                ${match.youtubeUrl ? `<a href="${match.youtubeUrl}" target="_blank" class="btn btn-outline" style="font-size: 0.8rem; padding: 4px 10px; margin-top: 5px;">🔗 Tester le lien actuel</a>` : ''}
                            </div>

                            <!-- Correction des Sets -->
                            <div style="border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 12px; margin-bottom: 12px;">
                                <strong>🔧 Correction du Score des Sets</strong>
                                <div class="form-group">
                                    <label>Sets ${team1Name}:</label>
                                    <input type="number" id="sets1-${id}" min="0" max="5" value="${currentSets1}">
                                </div>
                                <div class="form-group">
                                    <label>Sets ${team2Name}:</label>
                                    <input type="number" id="sets2-${id}" min="0" max="5" value="${currentSets2}">
                                </div>
                                <button class="btn btn-warning btn-block" onclick="correctSets('${id}')">✅ Corriger les Sets</button>
                            </div>

                            <!-- Synchronisation Vidéo -->
                            <div style="border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 12px; margin-bottom: 12px;">
                                <strong>🔄 Synchronisation Vidéo/Score</strong>
                                <div class="form-group">
                                    <label>Décalage (secondes):</label>
                                    <input type="number" id="offset-${id}" value="${currentOffset}" step="0.1">
                                    <small>+ si le score est en retard (vidéo en avance), - si le score est en avance (vidéo en retard)</small>
                                </div>
                                <button class="btn btn-info btn-block" onclick="applySync('${id}')">🔄 Appliquer</button>
                            </div>

                            <!-- Gestion du Flux -->
                            <div style="border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 12px; margin-bottom: 12px;">
                                <strong>🔌 Gestion du Flux</strong>
                                <button class="btn btn-info btn-block" onclick="reconnect('${id}')">🔌 Reconnecter</button>
                                <button class="btn btn-danger btn-block" onclick="clearSync('${id}')">🗑️ Réinitialiser Sync</button>
                            </div>

                            <!-- DVW & Replay -->
                            <div style="background: rgba(16,185,129,0.05); border: 1px solid rgba(16,185,129,0.3); border-radius: 8px; padding: 12px;">
                                <strong style="color: #10b981;">🎬 DVW & Replay</strong>
                                <p style="font-size:0.85rem; margin:6px 0 10px 0; opacity:0.8;">Associez un fichier DataVolley (.dvw) pour l'analyse vidéo en replay.</p>
                                <div style="margin-bottom:10px; font-size:0.85rem;" id="dvw-status-${id}">
                                    ${match.dvwStorageUrl
                                        ? `<span style="color:#10b981;">✅ Fichier DVW chargé</span>`
                                        : `<span style="opacity:0.6;">⚫ Aucun fichier DVW</span>`}
                                </div>
                                <div style="display:flex; gap:8px; align-items:center; margin-bottom:10px;">
                                    <input type="file" id="dvw-file-${id}" accept=".dvw" style="display:none;" onchange="uploadDvw('${id}')">
                                    <button class="btn btn-outline" onclick="document.getElementById('dvw-file-${id}').click()" style="font-size:0.85rem; padding:6px 12px;">📎 Charger DVW</button>
                                    <span id="dvw-progress-${id}" style="font-size:0.8rem; opacity:0.7;"></span>
                                </div>
                                <div id="dvw-actions-${id}">
                                    ${(() => {
                                        const hasDvw    = !!match.dvwStorageUrl;
                                        const hasVideo  = !!match.youtubeUrl;
                                        const hasStats  = !!(match.playerActions || match.rallies);
                                        if (hasDvw && hasVideo) {
                                            return `<div style="display:flex; gap:8px; flex-wrap:wrap;">
                                                <a href="replay-sync.html?id=${id}" class="btn btn-info" style="font-size:0.85rem; padding:6px 14px;">🔧 Calibrer la synchro</a>
                                                <a href="match-viewer.html?id=${id}" class="btn btn-primary" style="font-size:0.85rem; padding:6px 14px;">🎬 Voir le replay</a>
                                            </div>`;
                                        } else if (hasDvw && !hasVideo) {
                                            return `<p style="font-size:0.8rem; color:#f59e0b; margin:0;">⚠️ Ajoutez un lien YouTube pour accéder au replay</p>`;
                                        } else if (!hasDvw && hasVideo && hasStats) {
                                            return `<div style="display:flex; gap:8px; flex-wrap:wrap;">
                                                <span style="font-size:0.78rem;color:#a78bfa;">📊 Stats saisies détectées — Générez le DVW ci-dessous puis rechargez-le</span>
                                                <a href="replay-sync.html?id=${id}" class="btn btn-info" style="font-size:0.85rem; padding:6px 14px;">🔧 Calibrer la synchro</a>
                                            </div>`;
                                        } else {
                                            return `<p style="font-size:0.8rem; opacity:0.6; margin:0;">💡 Chargez un fichier DVW pour activer l'analyse replay</p>`;
                                        }
                                    })()}
                                </div>
                                <!-- Générer DVW depuis les stats live -->

        async function uploadFdme(id) {
            const fileInput = document.getElementById('fdme-input-' + id);
            const file = fileInput.files[0];
            if (!file) return;

            const progressEl = document.getElementById('fdme-progress-' + id);
            const statusEl   = document.getElementById('fdme-status-' + id);
            const zone       = document.getElementById('fdme-zone-' + id);
            const previewImg = document.getElementById('fdme-preview-' + id);

            progressEl.textContent = '⏳ Upload en cours...';
            zone.classList.add('has-file');

            try {
                const ext = file.name.split('.').pop().toLowerCase();
                const path = 'matches/' + id + '/fdme.' + ext;
                const url = await storageService.uploadFile(file, path, (p) => {
                    progressEl.textContent = '⏳ ' + Math.round(p) + '%';
                });

                await firebase.database().ref('matches/' + id + '/fdmeUrl').set(url);

                progressEl.textContent = '';
                statusEl.innerHTML = `✅ FDME chargée — <a href="${url}" target="_blank" style="color:#f59e0b;">Voir</a>`;

                // Mettre le bouton en vert
                const fdmeBtn = document.getElementById('fdme-btn-' + id);
                if (fdmeBtn) {
                    fdmeBtn.className = 'btn btn-toggle';
                    fdmeBtn.style.cssText = 'border-color:#10b981; color:#10b981; background:rgba(16,185,129,0.15);';
                    fdmeBtn.innerHTML = '<span style="color:#10b981;">✓</span> FDME';
                }

                // Prévisualisation si image
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => { previewImg.src = e.target.result; previewImg.style.display = 'block'; };
                    reader.readAsDataURL(file);
                }

                // Ajouter bouton Retirer
                const actionsDiv = progressEl.parentElement;
                if (!actionsDiv.querySelector('.fdme-remove-btn')) {
                    const btn = document.createElement('button');
                    btn.className = 'btn btn-danger fdme-remove-btn';
                    btn.style.cssText = 'font-size:0.8rem; padding:4px 12px;';
                    btn.textContent = '✕ Retirer';
                    btn.onclick = () => removeFdmeAdmin(id);
                    actionsDiv.appendChild(btn);
                }

                // === PARSING FDME via Gemini ===
                if (fdmeService._geminiApiKey) {
                    progressEl.textContent = '🤖 Analyse FDME en cours...';
                    try {
                        const fdmeData = await fdmeService.parseFdme(file, id);
                        if (fdmeData) {
                            progressEl.textContent = '✅ ' + fdmeData.team1.joueurs.length + ' + ' + fdmeData.team2.joueurs.length + ' joueurs détectés';
                            showFdmeValidationModal(fdmeData, id);
                        } else {
                            progressEl.textContent = '⚠️ Analyse FDME échouée — données non exploitables';
                        }
                    } catch (parseErr) {
                        console.error('Erreur parsing FDME:', parseErr);
                        progressEl.textContent = '⚠️ Erreur analyse : ' + parseErr.message;
                    }
                } else {
                    // Pas de clé API → proposer de configurer
                    progressEl.innerHTML = '💡 <a href="#" onclick="promptGeminiKey(\'' + id + '\');return false;" style="color:#f59e0b;">Configurer Gemini pour analyser la FDME</a>';
                }

            } catch (err) {
                console.error(err);
                progressEl.textContent = '❌ Erreur upload';
            }
        }

        async function correctSets(id) {
            const sets1 = parseInt(document.getElementById('sets1-' + id).value) || 0;
            const sets2 = parseInt(document.getElementById('sets2-' + id).value) || 0;

            if (!confirm(`Corriger le score des sets à ${sets1} - ${sets2} ?\n\n⚠️ Cette action modifie directement la base de données.`)) {
                return;
            }

            try {
                const matchRef = firebase.database().ref('matches/' + id);
                const snapshot = await matchRef.once('value');
                const oldScore = snapshot.val()?.score || {};

                await matchRef.child('score').update({
                    setsTeam1: sets1,
                    setsTeam2: sets2
                });

                await matchRef.child('corrections').push({
                    type: 'sets_correction',
                    oldSets: {
                        team1: oldScore.setsTeam1 || 0,
                        team2: oldScore.setsTeam2 || 0
                    },
                    newSets: {
                        team1: sets1,
                        team2: sets2
                    },
                    timestamp: firebase.database.ServerValue.TIMESTAMP,
                    correctedBy: 'admin_interface'
                });

                alert(`✅ Score des sets corrigé : ${sets1} - ${sets2}`);
            } catch (error) {
                console.error('Erreur correction:', error);
                alert('❌ Erreur lors de la correction');
            }
        }

        // Variable temporaire pour stocker le fdmeData en cours de validation
        let _pendingFdmeData = null;
        let _pendingFdmeMatchId = null;

        function showFdmeValidationModal(fdmeData, matchId) {
            _pendingFdmeData = fdmeData;
            _pendingFdmeMatchId = matchId;

            const modal = document.getElementById('fdmeModalContent');
            const confLevel = fdmeData.ocrConfidence >= 0.8 ? 'high' : fdmeData.ocrConfidence >= 0.5 ? 'medium' : 'low';
            const confLabel = Math.round(fdmeData.ocrConfidence * 100) + '%';

            // Générer le HTML des rosters
            const renderRoster = (joueurs, teamLabel) => {
                if (!joueurs || joueurs.length === 0) return '<p style="opacity:0.5;font-size:0.8rem;">Aucun joueur détecté</p>';
                return joueurs.map(j => `
                    <div class="fdme-player-row ${j.libero ? 'libero' : ''}">
                        <span class="num">${j.numero}</span>
                        <span>${j.nom}</span>
                        ${j.libero ? '<span style="color:#fbbf24;font-size:0.7rem;font-weight:700;">LIBERO</span>' : ''}
                        <span class="lic">${j.licence || ''}</span>
                    </div>
                `).join('');
            };

            // Générer le HTML des rotations
            const renderRotations = () => {
                const sets = Object.keys(fdmeData.rotationsDepart).sort();
                if (sets.length === 0) return '<p style="opacity:0.5;font-size:0.8rem;">Aucune rotation détectée</p>';

                let html = '<table class="fdme-rotation-table"><thead><tr><th>Set</th><th>Sert</th>';
                html += '<th>I</th><th>II</th><th>III</th><th>IV</th><th>V</th><th>VI</th>';
                html += '<th>—</th>';
                html += '<th>I</th><th>II</th><th>III</th><th>IV</th><th>V</th><th>VI</th>';
                html += '</tr></thead><tbody>';

                for (const setKey of sets) {
                    const rot = fdmeData.rotationsDepart[setKey];
                    const setNum = setKey.replace('set', '');
                    const servTeam = rot.team1Serves ? fdmeData.team1.nom : fdmeData.team2.nom;
                    const servLabel = servTeam.substring(0, 12);

                    html += '<tr>';
                    html += `<td><strong>${setNum}</strong></td>`;
                    html += `<td class="serve-indicator" style="font-size:0.7rem;">${servLabel}</td>`;

                    // Team 1
                    for (let i = 0; i < 6; i++) {
                        const num = rot.team1?.[i] || '?';
                        const isServing = rot.team1Serves && i === 0;
                        html += `<td style="${isServing ? 'color:#f59e0b;font-weight:700;' : ''}">${num}${isServing ? ' 🏐' : ''}</td>`;
                    }

                    html += '<td style="opacity:0.3;">vs</td>';

                    // Team 2
                    for (let i = 0; i < 6; i++) {
                        const num = rot.team2?.[i] || '?';
                        const isServing = !rot.team1Serves && i === 0;
                        html += `<td style="${isServing ? 'color:#f59e0b;font-weight:700;' : ''}">${num}${isServing ? ' 🏐' : ''}</td>`;
                    }

                    html += '</tr>';
                }

                html += '</tbody></table>';
                return html;
            };

            // Générer le HTML des résultats
            const renderResults = () => {
                if (!fdmeData.resultats.sets || fdmeData.resultats.sets.length === 0) {
                    return '<p style="opacity:0.5;font-size:0.8rem;">Aucun résultat détecté</p>';
                }
                let html = '<div class="fdme-results-row">';
                fdmeData.resultats.sets.forEach((s, i) => {
                    html += `<span class="fdme-set-score">Set ${i + 1} : ${s.team1} - ${s.team2}</span>`;
                });
                if (fdmeData.resultats.vainqueur) {
                    html += `<span style="margin-left:auto;font-weight:700;color:#10b981;">🏆 ${fdmeData.resultats.vainqueur} (${fdmeData.resultats.score})</span>`;
                }
                html += '</div>';
                return html;
            };

            // Générer le HTML des issues
            const renderIssues = () => {
                const issues = fdmeData._validationIssues || [];
                if (issues.length === 0) return '';
                return `<div class="fdme-section">
                    <h3>Remarques de validation</h3>
                    <div class="fdme-issues">${issues.map(i => '<div>' + i + '</div>').join('')}</div>
                </div>`;
            };

            modal.innerHTML = `
                <h2>📋 Validation FDME — ${fdmeData.team1.nom} vs ${fdmeData.team2.nom}</h2>
                <span class="fdme-confidence ${confLevel}">Confiance OCR : ${confLabel}</span>

                <div class="fdme-section">
                    <h3>Rosters</h3>
                    <div class="fdme-roster-grid">
                        <div class="fdme-team-col">
                            <h4>${fdmeData.team1.nom} (${fdmeData.team1.joueurs.length} joueurs)</h4>
                            ${renderRoster(fdmeData.team1.joueurs, 'team1')}
                        </div>
                        <div class="fdme-team-col">
                            <h4>${fdmeData.team2.nom} (${fdmeData.team2.joueurs.length} joueurs)</h4>
                            ${renderRoster(fdmeData.team2.joueurs, 'team2')}
                        </div>
                    </div>
                </div>

                <div class="fdme-section">
                    <h3>Passeuses — Système 5-1</h3>
                    <p style="opacity:0.6;font-size:0.8rem;margin:0 0 10px 0;">
                        Numéro de la passeuse de chaque équipe (optionnel).<br>
                        Permet de déduire les rôles DVW : passeuse (E), centrale (M), ailière (A), opposée (O).
                    </p>
                    <div style="display:flex;gap:20px;flex-wrap:wrap;">
                        <div>
                            <label style="display:block;font-size:0.8rem;opacity:0.8;margin-bottom:4px;">${fdmeData.team1.nom}</label>
                            <input type="number" id="fdme-passeuse-t1" placeholder="N° passeuse" min="1" max="99"
                                style="width:130px;padding:8px 10px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:white;font-size:1rem;">
                        </div>
                        <div>
                            <label style="display:block;font-size:0.8rem;opacity:0.8;margin-bottom:4px;">${fdmeData.team2.nom}</label>
                            <input type="number" id="fdme-passeuse-t2" placeholder="N° passeuse" min="1" max="99"
                                style="width:130px;padding:8px 10px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:white;font-size:1rem;">
                        </div>
                    </div>
                </div>

                <div class="fdme-section">
                    <h3>Rotations de départ</h3>
                    ${renderRotations()}
                </div>

                <div class="fdme-section">
                    <h3>Résultats</h3>
                    ${renderResults()}
                </div>

                ${renderIssues()}

                <div class="fdme-modal-actions">
                    <button class="btn btn-outline" onclick="closeFdmeModal()">❌ Rejeter</button>
                    <button class="btn btn-primary" onclick="validerFdme()" style="background:#10b981;">✅ Valider et sauvegarder</button>
                    <button class="btn btn-primary" onclick="validerEtCalculerRotations()" style="background:#6366f1;">✅ Valider + 🔄 Calculer rotations</button>
                </div>
            `;

            document.getElementById('fdmeModalOverlay').classList.add('show');

            // Pré-remplir les passeuses si déjà sauvegardées dans Firebase
            firebase.database().ref('matches/' + matchId + '/fdmeData/passeuses').once('value').then(snap => {
                const saved = snap.val() || {};
                if (saved.team1) { const el = document.getElementById('fdme-passeuse-t1'); if (el) el.value = saved.team1; }
                if (saved.team2) { const el = document.getElementById('fdme-passeuse-t2'); if (el) el.value = saved.team2; }
            });
        }

        function closeFdmeModal() {
            document.getElementById('fdmeModalOverlay').classList.remove('show');
            _pendingFdmeData = null;
            _pendingFdmeMatchId = null;
        }

        // Lit les numéros de passeuses saisis dans la modal FDME
        function _lirePasseusesModal() {
            const t1 = parseInt(document.getElementById('fdme-passeuse-t1')?.value) || 0;
            const t2 = parseInt(document.getElementById('fdme-passeuse-t2')?.value) || 0;
            return (t1 || t2) ? { team1: t1 || null, team2: t2 || null } : null;
        }

        async function validerFdme() {
            if (!_pendingFdmeData || !_pendingFdmeMatchId) return;

            const matchId = _pendingFdmeMatchId;
            const fdmeData = _pendingFdmeData;

            // Ajouter les passeuses si saisies
            const passeuses = _lirePasseusesModal();
            if (passeuses) fdmeData.passeuses = passeuses;

            try {
                await fdmeService.saveFdmeData(matchId, fdmeData);

                // Toast de confirmation
                closeFdmeModal();

                const progressEl = document.getElementById('fdme-progress-' + matchId);
                if (progressEl) {
                    progressEl.innerHTML = '<span style="color:#10b981;font-weight:600;">✅ FDME analysée et sauvegardée — ' + fdmeData.team1.joueurs.length + ' + ' + fdmeData.team2.joueurs.length + ' joueurs</span>';
                }

                alert('✅ Données FDME sauvegardées dans Firebase !\n\n' +
                    fdmeData.team1.nom + ' : ' + fdmeData.team1.joueurs.length + ' joueurs\n' +
                    fdmeData.team2.nom + ' : ' + fdmeData.team2.joueurs.length + ' joueurs\n' +
                    'Rotations : ' + Object.keys(fdmeData.rotationsDepart).length + ' set(s)');
            } catch (err) {
                console.error('Erreur sauvegarde fdmeData:', err);
                alert('❌ Erreur lors de la sauvegarde : ' + err.message);
            }
        }

        // ========== FDME — CONFIGURATION API GEMINI ==========

        function promptGeminiKey(matchId) {
            const key = prompt(
                '🔑 Entrez votre clé API Google AI Studio (Gemini)\n\n' +
                'Vous pouvez obtenir une clé gratuite sur :\nhttps://aistudio.google.com/app/apikey\n\n' +
                'La clé sera stockée dans ce navigateur uniquement.'
            );
            if (key && key.trim().length > 10) {
                fdmeService.setApiKey(key.trim());
                localStorage.setItem('gemini_api_key', key.trim());
                alert('✅ Clé Gemini configurée !\n\nRéuploadez la FDME pour lancer l\'analyse.');
            }
        }

        // Charger la clé Gemini depuis localStorage au démarrage
        (function initGeminiKey() {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) {
                fdmeService.setApiKey(savedKey);
                console.log('🔑 Clé Gemini chargée depuis localStorage');
            }
        })();

        // ========== FDME — BOUTON ANALYSER (pour les matchs avec FDME déjà uploadée) ==========

        async function analyserFdmeExistante(matchId) {
            const match = await dbService.getMatch(matchId);
            if (!match || !match.fdmeUrl) {
                alert('❌ Aucune FDME trouvée pour ce match');
                return;
            }

            if (!fdmeService._geminiApiKey) {
                promptGeminiKey(matchId);
                return;
            }

            const progressEl = document.getElementById('fdme-progress-' + matchId);
            if (progressEl) progressEl.textContent = '🤖 Analyse en cours...';

            try {
                // Télécharger le fichier depuis Firebase Storage
                const response = await fetch(match.fdmeUrl);
                const blob = await response.blob();
                const file = new File([blob], 'fdme', { type: blob.type });

                const fdmeData = await fdmeService.parseFdme(file, matchId);
                if (fdmeData) {
                    if (progressEl) progressEl.textContent = '✅ ' + fdmeData.team1.joueurs.length + ' + ' + fdmeData.team2.joueurs.length + ' joueurs';
                    showFdmeValidationModal(fdmeData, matchId);
                } else {
                    if (progressEl) progressEl.textContent = '⚠️ Analyse échouée';
                }
            } catch (err) {
                console.error('Erreur analyse FDME existante:', err);
                if (progressEl) progressEl.textContent = '❌ Erreur : ' + err.message;
            }
        }

        async function validerEtCalculerRotations() {
            if (!_pendingFdmeData || !_pendingFdmeMatchId) return;
            const matchId = _pendingFdmeMatchId;
            // Capturer fdmeData AVANT closeFdmeModal() qui remet _pendingFdmeData à null
            const fdmeCopy = _pendingFdmeData;

            // Ajouter les passeuses si saisies
            const passeuses = _lirePasseusesModal();
            if (passeuses) fdmeCopy.passeuses = passeuses;

            // 1. D'abord valider et sauvegarder
            try {
                await fdmeService.saveFdmeData(matchId, fdmeCopy);
            } catch (err) {
                alert('❌ Erreur sauvegarde fdmeData : ' + err.message);
                return;
            }

            closeFdmeModal();

            // 2. Détecter si les équipes FDME sont inversées par rapport à Firebase
            try {
                const matchSnap = await firebase.database().ref('matches/' + matchId).once('value');
                const matchData = matchSnap.val() || {};

                // Extraire noms FDME (structure réelle : team1.nom / team2.nom)
                const fdme = fdmeCopy;
                const fdmeHome = (fdme.team1?.nom || fdme.equipes?.domicile || fdme.equipes?.home || fdme.teamA || '');
                const fdmeAway = (fdme.team2?.nom || fdme.equipes?.exterieur || fdme.equipes?.away || fdme.teamB || '');

                // Extraire noms Firebase
                const fbTeam1 = (matchData.team1?.name || matchData.team1?.nom || matchData.homeTeam || matchData.team1Name || '');
                const fbTeam2 = (matchData.team2?.name || matchData.team2?.nom || matchData.awayTeam || matchData.team2Name || '');

                console.log('[SWAP CHECK] fdmeHome="' + fdmeHome + '" fdmeAway="' + fdmeAway + '" fbTeam1="' + fbTeam1 + '" fbTeam2="' + fbTeam2 + '"');

                // Toujours afficher la confirmation avec les noms trouvés
                const msg = '📋 Vérification des équipes\n\n' +
                    'FDME domicile : "' + (fdmeHome || '(non trouvé)') + '"\n' +
                    'FDME extérieur : "' + (fdmeAway || '(non trouvé)') + '"\n\n' +
                    'Firebase équipe 1 : "' + (fbTeam1 || '(non trouvé)') + '"\n' +
                    'Firebase équipe 2 : "' + (fbTeam2 || '(non trouvé)') + '"\n\n' +
                    '⚠️ Les équipes FDME sont-elles INVERSÉES par rapport à Firebase ?\n' +
                    '(OK = Oui, inverser | Annuler = Non, garder tel quel)';

                const doSwap = confirm(msg);
                await firebase.database().ref('matches/' + matchId + '/fdmeSwapped').set(doSwap);
                console.log('[SWAP] fdmeSwapped=' + doSwap);
            } catch(e) {
                console.warn('[SWAP] Erreur détection swap :', e);
            }

            // 3. Calculer les rotations
            await calculerRotationsPourMatch(matchId);
        }

        async function reanalyserFdme(matchId) {
            // Délègue à analyserFdmeExistante qui gère tout : fetch, parseFdme, modal de validation
            await analyserFdmeExistante(matchId);
        }

        async function calculerRotationsPourMatch(matchId) {
            const progressEl = document.getElementById('fdme-progress-' + matchId);
            if (progressEl) progressEl.textContent = '🔄 Calcul des rotations en cours...';

            try {
                const result = await rotationEngine.computeAndSaveRotations(matchId);
                const msg = '✅ Rotations calculées : ' + result.nbRallies + ' rallies sur ' + result.nbSets + ' set(s)';
                if (progressEl) progressEl.innerHTML = '<span style="color:#a78bfa;font-weight:600;">' + msg + '</span>';
                alert('✅ Rotations sauvegardées dans Firebase !\n\n' +
                    result.nbRallies + ' rallies enrichis\n' +
                    result.nbSets + ' set(s) calculé(s)\n\n' +
                    'Les champs rotationTeam1, rotationTeam2, servingPlayerNumber_computed\n' +
                    'sont maintenant disponibles dans chaque rally.');
            } catch (err) {
                console.error('Erreur calcul rotations:', err);
                if (progressEl) progressEl.textContent = '❌ Erreur rotations : ' + err.message;
                alert('❌ Erreur lors du calcul des rotations :\n\n' + err.message);
            }
        }

        async function voirFdmeData(matchId) {
            try {
                const fdmeData = await fdmeService.getFdmeData(matchId);
                if (fdmeData) {
                    showFdmeValidationModal(fdmeData, matchId);
                } else {
                    alert('❌ Aucune donnée FDME trouvée pour ce match');
                }
            } catch (err) {
                alert('❌ Erreur : ' + err.message);
            }
        }

        window.onload = loadMatches;
    </script>
</body>

</html>
