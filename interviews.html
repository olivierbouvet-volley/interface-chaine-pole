<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interviews Interpole - Pôle Espoir Volleyball</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --success: #10B981;
            --danger: #EF4444;
            --dark: #1F2937;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            min-height: 100vh;
            color: var(--white);
        }

        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 { font-size: 1.5rem; font-weight: 800; }

        .btn-nav {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-nav:hover { background: rgba(255, 255, 255, 0.2); }
        .btn-primary { background: var(--primary); border-color: var(--primary); }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 20px;
        }

        .interviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        .video-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-color: var(--primary);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: black;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-info {
            padding: 20px;
        }

        .video-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .video-meta {
            display: flex;
            gap: 10px;
            font-size: 0.9rem;
            opacity: 0.7;
            align-items: center;
            flex-wrap: wrap;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-prep { background: #3b82f6; color: white; } /* Blue for Prep */
        .badge-reaction { background: #f59e0b; color: white; } /* Orange for Reaction/Post */
        .badge-interpole { background: #10b981; color: white; } /* Green for Interpole */

        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px;
            font-size: 1.5rem;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="header-content">
            <h1>🎙️ Interviews & Réactions</h1>
            <div style="display: flex; gap: 10px;">
                 <a href="lives-weekend.html" class="btn-nav">📺 Lives du Week-end</a>
                 <a href="index.html" class="btn-nav">🏠 Accueil</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="interviewsGrid" class="interviews-grid">
            <div class="loading">Chargement des vidéos...</div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <!-- Services -->
    <script src="firebase-config.js"></script>
    <script src="db-service.js"></script>

    <script>
        async function loadInterviews() {
            try {
                const interviews = await dbService.getAllInterviews();
                const container = document.getElementById('interviewsGrid');
                container.innerHTML = '';

                // Convertir en tableau et trier par date de création (plus récent en premier)
                const sortedInterviews = Object.values(interviews).sort((a, b) => {
                    return (b.createdAt || 0) - (a.createdAt || 0);
                });

                if (sortedInterviews.length === 0) {
                    container.innerHTML = '<div class="loading">Aucune interview disponible pour le moment.</div>';
                    return;
                }

                sortedInterviews.forEach(interview => {
                    const embedUrl = getYoutubeEmbedUrl(interview.youtubeUrl);
                    if (!embedUrl) return; // Skip if invalid URL

                    let badgeClass = 'badge-interpole';
                    const cat = (interview.category || '').toLowerCase();
                    if (cat.includes('avant') || cat.includes('prep')) badgeClass = 'badge-prep';
                    if (cat.includes('après') || cat.includes('post') || cat.includes('réaction')) badgeClass = 'badge-reaction';

                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.innerHTML = `
                        <div class="video-wrapper">
                            <iframe src="${embedUrl}" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
                        </div>
                        <div class="video-info">
                            <div class="video-title">${interview.title}</div>
                            <div class="video-meta">
                                <span class="badge ${badgeClass}">${interview.category}</span>
                                ${(interview.team ? `<span>• ${interview.team}</span>` : '')}
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                console.error("Erreur chargement:", error);
                document.getElementById('interviewsGrid').innerHTML = '<div class="loading">❌ Erreur de chargement.</div>';
            }
        }

        function getYoutubeEmbedUrl(url) {
            if (!url) return null;
            const videoIdMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|live\/|shorts\/))([^?&/]+)/);
            if (videoIdMatch && videoIdMatch[1]) {
                return `https://www.youtube.com/embed/${videoIdMatch[1]}`;
            }
            return null;
        }

        window.onload = loadInterviews;
    </script>
</body>
</html>
